name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Build Python runtime bundle
        shell: pwsh
        run: |
          $pythonVersion = "3.11.9"
          $embedUrl = "https://www.python.org/ftp/python/$pythonVersion/python-$pythonVersion-embed-amd64.zip"
          $destDir = "ui/python-runtime"

          Write-Host "Downloading Python $pythonVersion embeddable..."
          Invoke-WebRequest -Uri $embedUrl -OutFile python-embed.zip
          Expand-Archive -Path python-embed.zip -DestinationPath $destDir -Force

          # Enable site-packages so pip-installed packages are importable
          $pthFile = Get-ChildItem $destDir -Filter "*._pth" | Select-Object -First 1
          (Get-Content $pthFile.FullName) -replace '#import site', 'import site' | Set-Content $pthFile.FullName

          # Install pip
          Write-Host "Installing pip..."
          Invoke-WebRequest -Uri "https://bootstrap.pypa.io/get-pip.py" -OutFile get-pip.py
          & "$destDir/python.exe" get-pip.py --no-warn-script-location

          # Install project requirements
          Write-Host "Installing requirements..."
          & "$destDir/python.exe" -m pip install -r requirements.txt --no-warn-script-location

          Write-Host "Python runtime bundle ready."

      - name: Install dependencies
        run: cd ui && npm ci

      - name: Build and publish
        run: cd ui && npm run electron:build
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          # Uncomment when code signing is configured (P4):
          # CSC_LINK: ${{ secrets.CSC_LINK }}
          # CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
